name: Scrape ffmadrid and push to back

on:
  schedule:
    # Every 12 hours at minute 0
    - cron: '0 */12 * * *'
  workflow_dispatch:

concurrency:
  group: scrape-ffmadrid
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    env:
      FFMADRID_BASE_URL: https://aranjuez.ffmadrid.es
      FFMADRID_COD_PRIMARIA: '1000128'
      FFMADRID_COD_COMPETICION: '1009587'
      FFMADRID_COD_GRUPO: '1009597'
      FFMADRID_COD_TEMPORADA: '21'
      BACK_BASE_URL: https://realtajoback-b8a4dxbxdkhtgham.westeurope-01.azurewebsites.net

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run scraper
        env:
          FFMADRID_USER: ${{ secrets.FFMADRID_USER }}
          FFMADRID_PASS: ${{ secrets.FFMADRID_PASS }}
          BACK_API_KEY: ${{ secrets.BACK_API_KEY }}
        run: python scripts/run_scraper.py
